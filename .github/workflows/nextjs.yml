name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Or "master", depending on your default branch
  workflow_dispatch: # Allows you to run the build manually

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install dependencies
        run: npm ci # Change to 'yarn install --frozen-lockfile' or 'pnpm install' if not using npm
        
      - name: Build Next.js site
        run: npx next build
        env:
          NEXT_PUBLIC_DEVFEST_GUIDE_ENABLED: ${{ vars.NEXT_PUBLIC_DEVFEST_GUIDE_ENABLED }}
          NEXT_PUBLIC_DEVFEST_GUIDE_API_URL: ${{ vars.NEXT_PUBLIC_DEVFEST_GUIDE_API_URL }}
        # `app/page.tsx` (the true, unprefixed "/" route) redirects to the
        # default locale on its own, baked into `out/index.html` by
        # `next build`. `out/it/...` and `out/en/...` are the real
        # locale-prefixed content. No post-build copy step is needed
        # anymore to make the default locale reachable at the root —
        # routing.localePrefix is now "always", so there is no unprefixed
        # locale content route to fake via copying files.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js outputs the static export to the 'out' directory

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
